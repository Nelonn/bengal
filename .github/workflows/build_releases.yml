# Build Bengal CLI for all platforms on pull request to main
# Creates artifacts for:
# - Linux (.deb, .rpm, .tar.gz) - amd64, arm64
# - macOS (.tar.gz, .pkg) - amd64, arm64
# - Windows (.zip) - amd64, arm64

name: Build Releases

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: bengal

# ========== LINUX ==========
jobs:
  # ========== DEBIAN/UBUNTU (.deb) ==========
  build-deb-amd64:
    name: Build Debian Package (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          RAW_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          VERSION=${RAW_VERSION#v}
          # Convert to deb-compatible version: replace dashes with tildes
          # e.g., "1.0.0-beta" -> "1.0.0~beta", "1.0.0-dirty" -> "1.0.0~dirty"
          DEB_VERSION=$(echo "$VERSION" | sed 's/-/~/g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "deb_version=$DEB_VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-amd64-${{ hashFiles('**/Cargo.lock') }}

      - name: Install packaging tools
        run: |
          sudo apt update
          sudo apt install -y fakeroot dpkg-dev

      - name: Build release binary
        run: cargo build --release --bin bengal

      - name: Create DEB package structure
        run: |
          mkdir -p debian-package/DEBIAN
          mkdir -p debian-package/usr/bin
          mkdir -p debian-package/usr/share/doc/bengal

          cp target/release/bengal debian-package/usr/bin/
          chmod 755 debian-package/usr/bin/bengal

          cat > debian-package/DEBIAN/control << EOF
          Package: bengal
          Version: ${{ steps.version.outputs.deb_version }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libssl3
          Maintainer: Bengal Language Team
          Description: Bengal language CLI
           Bengal programming language command-line interface
          EOF

          cp README.md debian-package/usr/share/doc/bengal/

      - name: Build DEB package
        run: |
          fakeroot dpkg-deb --build debian-package bengal_${{ steps.version.outputs.deb_version }}_amd64.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bengal-deb-amd64
          path: bengal_*.deb

  build-deb-arm64:
    name: Build Debian Package (arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          RAW_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          VERSION=${RAW_VERSION#v}
          DEB_VERSION=$(echo "$VERSION" | sed 's/-/~/g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "deb_version=$DEB_VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo dpkg --add-architecture arm64

          sudo tee /etc/apt/sources.list << 'EOF'
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble main restricted universe multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-updates main restricted universe multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-backports main restricted universe multiverse
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF

          sudo rm -f /etc/apt/sources.list.d/ubuntu.sources
          sudo rm -f /etc/apt/apt-mirrors.txt

          sudo apt update
          sudo apt install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libssl-dev:arm64 \
            fakeroot \
            dpkg-dev

      - name: Set pkg-config for cross-compilation
        run: |
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-arm64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary (arm64)
        run: |
          cargo build --release --bin bengal --target aarch64-unknown-linux-gnu
          mkdir -p target/release-arm64
          cp target/aarch64-unknown-linux-gnu/release/bengal target/release-arm64/bengal

      - name: Create DEB package structure
        run: |
          mkdir -p debian-package/DEBIAN
          mkdir -p debian-package/usr/bin
          mkdir -p debian-package/usr/share/doc/bengal

          cp target/release-arm64/bengal debian-package/usr/bin/
          chmod 755 debian-package/usr/bin/bengal

          cat > debian-package/DEBIAN/control << EOF
          Package: bengal
          Version: ${{ steps.version.outputs.deb_version }}
          Section: utils
          Priority: optional
          Architecture: arm64
          Depends: libssl3
          Maintainer: Bengal Language Team
          Description: Bengal language CLI
           Bengal programming language command-line interface
          EOF

          cp README.md debian-package/usr/share/doc/bengal/

      - name: Build DEB package
        run: |
          fakeroot dpkg-deb --build debian-package bengal_${{ steps.version.outputs.deb_version }}_arm64.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bengal-deb-arm64
          path: bengal_*.deb

  # ========== FEDORA/RHEL (.rpm) ==========
  build-rpm-amd64:
    name: Build RPM Package (amd64)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          RAW_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          VERSION=${RAW_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: fedora-cargo-amd64-${{ hashFiles('**/Cargo.lock') }}

      - name: Install build dependencies
        run: |
          dnf install -y rpm-build fakeroot gcc clang make pkgconfig openssl openssl-devel

      - name: Build release binary
        run: cargo build --release --bin bengal

      - name: Create RPM package structure
        run: |
          mkdir -p rpm-package/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p rpm-package/SOURCES/bengal-${{ steps.version.outputs.version }}

          cp target/release/bengal rpm-package/SOURCES/bengal-${{ steps.version.outputs.version }}/
          chmod 755 rpm-package/SOURCES/bengal-${{ steps.version.outputs.version }}/bengal

          tar -czf rpm-package/SOURCES/bengal-${{ steps.version.outputs.version }}.tar.gz -C rpm-package/SOURCES/ bengal-${{ steps.version.outputs.version }}

          cat > rpm-package/SPECS/bengal.spec << EOF
          Name:           bengal
          Version:        ${{ steps.version.outputs.version }}
          Release:        1%{?dist}
          Summary:        Bengal language CLI
          License:        MIT
          URL:            https://github.com/${{ github.repository }}
          Requires:       openssl-libs

          %description
          Bengal programming language command-line interface

          %install
          mkdir -p %{buildroot}/usr/bin
          cp %{_sourcedir}/bengal-${{ steps.version.outputs.version }}/bengal %{buildroot}/usr/bin/
          chmod 755 %{buildroot}/usr/bin/bengal

          %files
          /usr/bin/bengal

          %preun
          if [ \$1 -eq 0 ]; then
            rm -f /usr/bin/bengal
          fi
          EOF

      - name: Build RPM package
        run: |
          rpmbuild -bb rpm-package/SPECS/bengal.spec \
            --define "_topdir $(pwd)/rpm-package" \
            --define "_rpmdir $(pwd)/rpm-package/RPMS"

          find rpm-package/RPMS -name "*.rpm" -exec cp {} rpm-package/bengal_${{ steps.version.outputs.version }}_amd64.rpm \;

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: bengal-rpm-amd64
          path: rpm-package/bengal_*.rpm

  build-rpm-arm64:
    name: Build RPM Package (arm64)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          RAW_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          VERSION=${RAW_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: fedora-cargo-arm64-${{ hashFiles('**/Cargo.lock') }}

      - name: Install build dependencies
        run: |
          dnf install -y rpm-build fakeroot gcc clang make pkgconfig openssl openssl-devel \
          gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
          libgcc glibc-devel perl perl-IPC-Cmd

      - name: Install aarch64 sysroot headers
        continue-on-error: true
        run: |
          dnf install -y glibc-devel.aarch64 libgcc.aarch64 || true
          SYSROOT=/usr/aarch64-linux-gnu/sys-root
          mkdir -p $SYSROOT/usr/include
          cp -r /usr/include/bits $SYSROOT/usr/include/ 2>/dev/null || true
          cp -r /usr/include/sys $SYSROOT/usr/include/ 2>/dev/null || true

      - name: Build OpenSSL for aarch64
        continue-on-error: true
        run: |
          curl -fsSL https://www.openssl.org/source/openssl-3.3.2.tar.gz | tar -xz
          cd openssl-3.3.2
          ./Configure linux-aarch64 \
          --cross-compile-prefix=aarch64-linux-gnu- \
          --prefix=/usr/local/aarch64-openssl \
          no-shared
          make -j$(nproc)
          make install

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          OPENSSL_STATIC: "1"
          OPENSSL_DIR: /usr/local/aarch64-openssl
        run: cargo build --release --bin bengal --target aarch64-unknown-linux-gnu

      - name: Create RPM package structure
        run: |
          mkdir -p rpm-package/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p rpm-package/SOURCES/bengal-${{ steps.version.outputs.version }}

          cp target/aarch64-unknown-linux-gnu/release/bengal rpm-package/SOURCES/bengal-${{ steps.version.outputs.version }}/
          chmod 755 rpm-package/SOURCES/bengal-${{ steps.version.outputs.version }}/bengal

          tar -czf rpm-package/SOURCES/bengal-${{ steps.version.outputs.version }}.tar.gz -C rpm-package/SOURCES/ bengal-${{ steps.version.outputs.version }}

          cat > rpm-package/SPECS/bengal.spec << EOF
          Name:           bengal
          Version:        ${{ steps.version.outputs.version }}
          Release:        1%{?dist}
          Summary:        Bengal language CLI
          License:        MIT
          URL:            https://github.com/${{ github.repository }}
          Requires:       openssl-libs

          %description
          Bengal programming language command-line interface

          %install
          mkdir -p %{buildroot}/usr/bin
          cp %{_sourcedir}/bengal-${{ steps.version.outputs.version }}/bengal %{buildroot}/usr/bin/
          chmod 755 %{buildroot}/usr/bin/bengal

          %files
          /usr/bin/bengal

          %preun
          if [ \$1 -eq 0 ]; then
            rm -f /usr/bin/bengal
          fi
          EOF

      - name: Build RPM package
        run: |
          rpmbuild -bb rpm-package/SPECS/bengal.spec \
            --define "_topdir $(pwd)/rpm-package" \
            --define "_rpmdir $(pwd)/rpm-package/RPMS" \
            --target aarch64

          find rpm-package/RPMS -name "*.rpm" -exec cp {} rpm-package/bengal_${{ steps.version.outputs.version }}_arm64.rpm \;

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: bengal-rpm-arm64
          path: rpm-package/bengal_*.rpm

  # ========== ARCH LINUX (.tar.gz) ==========
  build-arch-amd64:
    name: Build Arch Linux Package (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          RAW_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          VERSION=${RAW_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-arch-amd64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin bengal

      - name: Create Arch .tar.gz package
        run: |
          mkdir -p arch-package/usr/bin
          mkdir -p arch-package/usr/share/doc/bengal

          cp target/release/bengal arch-package/usr/bin/
          chmod 755 arch-package/usr/bin/bengal
          cp README.md arch-package/usr/share/doc/bengal/

          tar -czf bengal_${{ steps.version.outputs.version }}_arch_amd64.tar.gz -C arch-package usr

      - name: Create PKGBUILD
        run: |
          cat > PKGBUILD << EOF
          pkgname=bengal
          pkgver=${{ steps.version.outputs.version }}
          pkgrel=1
          pkgdesc="Bengal language CLI"
          arch=('x86_64')
          url="https://github.com/${{ github.repository }}"
          license=('MIT')
          provides=('bengal')

          package() {
            cd "\${srcdir}"
            install -Dm755 bengal "\${pkgdir}/usr/bin/bengal"
            install -Dm644 README.md "\${pkgdir}/usr/share/doc/bengal/README.md"
          }
          EOF

      - name: Create .SRCINFO
        run: |
          cat > .SRCINFO << EOF
          pkgbase = bengal
          pkgver = ${{ steps.version.outputs.version }}
          pkgrel = 1
          pkgdesc = Bengal language CLI
          url = https://github.com/${{ github.repository }}
          arch = x86_64
          license = MIT
          provides = bengal
          EOF

      - name: Upload Arch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bengal-arch-amd64
          path: |
            bengal_*.tar.gz
            PKGBUILD
            .SRCINFO

  # ========== MACOS ==========
  build-macos-amd64:
    name: Build macOS Package (amd64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          RAW_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          VERSION=${RAW_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-macos-amd64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin bengal --target x86_64-apple-darwin

      - name: Create macOS package structure
        run: |
          mkdir -p macos-package/bin
          mkdir -p macos-package/share/doc/bengal

          cp target/x86_64-apple-darwin/release/bengal macos-package/bin/
          chmod 755 macos-package/bin/bengal
          cp README.md macos-package/share/doc/bengal/

          tar -czf bengal_${{ steps.version.outputs.version }}_macos_amd64.tar.gz -C macos-package bin share

      - name: Create installer package (.pkg)
        run: |
          mkdir -p pkg-root/usr/bin
          cp target/x86_64-apple-darwin/release/bengal pkg-root/usr/bin/
          chmod 755 pkg-root/usr/bin/bengal

          pkgbuild --root pkg-root \
                   --identifier io.github.cubekii.bengal \
                   --version ${{ steps.version.outputs.version }} \
                   --install-location / \
                   bengal_${{ steps.version.outputs.version }}_macos_amd64.pkg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bengal-macos-amd64
          path: |
            bengal_*_macos_amd64.tar.gz
            bengal_*_macos_amd64.pkg

  build-macos-arm64:
    name: Build macOS Package (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          RAW_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          VERSION=${RAW_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-macos-arm64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin bengal --target aarch64-apple-darwin

      - name: Create macOS package structure
        run: |
          mkdir -p macos-package/bin
          mkdir -p macos-package/share/doc/bengal

          cp target/aarch64-apple-darwin/release/bengal macos-package/bin/
          chmod 755 macos-package/bin/bengal
          cp README.md macos-package/share/doc/bengal/

          tar -czf bengal_${{ steps.version.outputs.version }}_macos_arm64.tar.gz -C macos-package bin share

      - name: Create installer package (.pkg)
        run: |
          mkdir -p pkg-root/usr/bin
          cp target/aarch64-apple-darwin/release/bengal pkg-root/usr/bin/
          chmod 755 pkg-root/usr/bin/bengal

          pkgbuild --root pkg-root \
                   --identifier io.github.cubekii.bengal \
                   --version ${{ steps.version.outputs.version }} \
                   --install-location / \
                   bengal_${{ steps.version.outputs.version }}_macos_arm64.pkg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bengal-macos-arm64
          path: |
            bengal_*_macos_arm64.tar.gz
            bengal_*_macos_arm64.pkg

  # ========== WINDOWS ==========
  build-windows-amd64:
    name: Build Windows Package (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        shell: bash
        run: |
          RAW_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          VERSION=${RAW_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-windows-amd64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin bengal --target x86_64-pc-windows-msvc

      - name: Create Windows package
        shell: bash
        run: |
          mkdir -p windows-package/bin
          cp target/x86_64-pc-windows-msvc/release/bengal.exe windows-package/bin/
          cp README.md windows-package/
          cd windows-package && zip -r ../bengal_${{ steps.version.outputs.version }}_windows_amd64.zip .

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bengal-windows-amd64
          path: |
            bengal_*_windows_amd64.zip

  build-windows-arm64:
    name: Build Windows Package (arm64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        shell: bash
        run: |
          RAW_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          VERSION=${RAW_VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-pc-windows-msvc

      - name: Install LLVM for cross-compilation
        run: choco install llvm -y

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-windows-arm64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin bengal --target aarch64-pc-windows-msvc

      - name: Create Windows package
        shell: bash
        run: |
          mkdir -p windows-package/bin
          cp target/aarch64-pc-windows-msvc/release/bengal.exe windows-package/bin/
          cp README.md windows-package/
          cd windows-package && zip -r ../bengal_${{ steps.version.outputs.version }}_windows_arm64.zip .

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bengal-windows-arm64
          path: |
            bengal_*_windows_arm64.zip
