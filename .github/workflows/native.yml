# Build Bengal CLI for macOS and Windows on release
# Creates packages for:
# - macOS (.tar.gz, .pkg) - x86_64, arm64
# - Windows (.exe, .msi) - x86_64, arm64

name: macOS & Windows Release Builds

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: bengal

jobs:
  # ========== MACOS ==========
  build-macos-x86_64:
    name: Build macOS Package (x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-macos-x86_64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin bengal --target x86_64-apple-darwin

      - name: Create macOS package structure
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p macos-package/bin
          mkdir -p macos-package/share/doc/bengal

          cp target/x86_64-apple-darwin/release/bengal macos-package/bin/
          chmod 755 macos-package/bin/bengal
          cp README.md macos-package/share/doc/bengal/

          tar -czf bengal_${VERSION#v}_macos_x86_64.tar.gz -C macos-package bin share

      - name: Create installer package (.pkg)
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p pkg-root/usr/bin
          cp target/x86_64-apple-darwin/release/bengal pkg-root/usr/bin/
          chmod 755 pkg-root/usr/bin/bengal
          
          pkgbuild --root pkg-root \
                   --identifier io.github.cubekii.bengal \
                   --version ${VERSION#v} \
                   --install-location / \
                   bengal_${VERSION#v}_macos_x86_64.pkg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bengal-macos-x86_64
          path: |
            bengal_*_macos_x86_64.tar.gz
            bengal_*_macos_x86_64.pkg

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bengal_*_macos_x86_64.tar.gz
            bengal_*_macos_x86_64.pkg

  build-macos-arm64:
    name: Build macOS Package (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-macos-arm64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin bengal --target aarch64-apple-darwin

      - name: Create macOS package structure
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p macos-package/bin
          mkdir -p macos-package/share/doc/bengal

          cp target/aarch64-apple-darwin/release/bengal macos-package/bin/
          chmod 755 macos-package/bin/bengal
          cp README.md macos-package/share/doc/bengal/

          tar -czf bengal_${VERSION#v}_macos_arm64.tar.gz -C macos-package bin share

      - name: Create installer package (.pkg)
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p pkg-root/usr/bin
          cp target/aarch64-apple-darwin/release/bengal pkg-root/usr/bin/
          chmod 755 pkg-root/usr/bin/bengal
          
          pkgbuild --root pkg-root \
                   --identifier io.github.cubekii.bengal \
                   --version ${VERSION#v} \
                   --install-location / \
                   bengal_${VERSION#v}_macos_arm64.pkg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bengal-macos-arm64
          path: |
            bengal_*_macos_arm64.tar.gz
            bengal_*_macos_arm64.pkg

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bengal_*_macos_arm64.tar.gz
            bengal_*_macos_arm64.pkg

  # ========== WINDOWS ==========
  build-windows-x86_64:
    name: Build Windows Package (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-windows-x86_64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin bengal --target x86_64-pc-windows-msvc

      - name: Create Windows package
        run: |
          $VERSION = "${env:GITHUB_REF}".Replace("refs/tags/", "")
          New-Item -ItemType Directory -Path windows-package\bin -Force
          Copy-Item target\x86_64-pc-windows-msvc\release\bengal.exe windows-package\bin\
          Copy-Item README.md windows-package\
          Compress-Archive -Path windows-package\* -DestinationPath bengal_${VERSION}_windows_x86_64.zip -Force

      - name: Create Windows installer (.msi)
        run: |
          $VERSION = "${env:GITHUB_REF}".Replace("refs/tags/", "").Replace("v", "")
          New-Item -ItemType Directory -Path msi-root\ProgramFiles\bengal -Force
          Copy-Item target\x86_64-pc-windows-msvc\release\bengal.exe msi-root\ProgramFiles\bengal\
          
          $wix = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path $wix) {
            & "$wix\heat.exe" dir msi-root\ProgramFiles\bengal -gg -sfrag -sreg -srd -dr INSTALLFOLDER -cg BengalFiles -var var.BengalSource -o Product.wxs
            # Note: Full MSI build requires additional wix configuration
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bengal-windows-x86_64
          path: |
            bengal_*_windows_x86_64.zip
            bengal_*_windows_x86_64.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bengal_*_windows_x86_64.zip
            bengal_*_windows_x86_64.exe

  build-windows-arm64:
    name: Build Windows Package (arm64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-pc-windows-msvc

      - name: Install LLVM for cross-compilation
        run: choco install llvm -y

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-windows-arm64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin bengal --target aarch64-pc-windows-msvc

      - name: Create Windows package
        run: |
          $VERSION = "${env:GITHUB_REF}".Replace("refs/tags/", "")
          New-Item -ItemType Directory -Path windows-package\bin -Force
          Copy-Item target\aarch64-pc-windows-msvc\release\bengal.exe windows-package\bin\
          Copy-Item README.md windows-package\
          Compress-Archive -Path windows-package\* -DestinationPath bengal_${VERSION}_windows_arm64.zip -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bengal-windows-arm64
          path: |
            bengal_*_windows_arm64.zip
            bengal_*_windows_arm64.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bengal_*_windows_arm64.zip
            bengal_*_windows_arm64.exe
